<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Gratis | Edu-Free</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="edu">Edu-</span><span class="free">Free.</span>
            </div>
            
            <h2 class="auth-title">Buat Akun Mahasiswa</h2>

            <form id="registerForm">
                <div class="input-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" required>
                </div>

                <div class="input-group">
                    <label for="nim">NIM</label>
                    <input type="number" id="nim" placeholder="Masukkan NIM Anda" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Buat Password" required>
                </div>

                <div class="input-group">
                    <label for="semester">Pilih Semester Pembelajaran</label>
                    <select id="semester" required>
                        <option value="" disabled selected>-- Pilih Semester --</option>
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Daftar Gratis</button>
            </form>

            <p class="auth-switch">Sudah punya akun? <a href="dashboardSiswa.html" id="toLogin">Masuk di sini</a></p>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
