<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | Edu-Free</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">Edu<span style="color: #c084fc;">-Free.</span></div>
            <h2 class="auth-title">Selamat Datang Kembali!</h2>
            <p class="auth-subtitle">Silakan masuk menggunakan NIM Anda.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="login-nim">NIM</label>
                    <input type="number" id="login-nim" placeholder="Masukkan NIM Anda" required>
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Masukkan Password" required>
                </div>

                <button type="submit" class="btn-primary">Masuk</button>
            </form>

            <p class="auth-switch">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
        </div>
    </div>

    <script>
        // Memastikan HTML dimuat semua dulu
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');

            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault(); // Mencegah reload halaman
                    
                    // Ambil inputan dari user
                    const inputNim = document.getElementById('login-nim').value;
                    const inputPassword = document.getElementById('login-password').value;

                    // MENCARI DATA DI "DATABASE BOHONGAN" (LocalStorage)
                    // Kita cari data berdasarkan NIM yang diinput
                    const userDataString = localStorage.getItem(inputNim);

                    // LOGIKA PENGECEKAN
                    if (userDataString) {
                        // JIKA AKUN DITEMUKAN:
                        // Ubah data dari teks (string) menjadi objek agar bisa dibaca
                        const userData = JSON.parse(userDataString);

                        // Cek apakah passwordnya benar?
                        if (userData.password === inputPassword) {
                            alert(`Selamat datang kembali, ${userData.nama}!`);
                            
                            // SET SESSION LOGGED IN (Agar dikenali di halaman beranda)
                            localStorage.setItem('loggedInUser', userDataString);

                            // Arahkan ke halaman beranda sesuai semester pilihannya
                            if (userData.semester === "1") {
                                window.location.href = "indexsetelahlogin.html"; 
                            } else if (userData.semester === "2") {
                                window.location.href = "indexsetelahlogin2.html"; 
                            }
                        } else {
                            // JIKA PASSWORD SALAH
                            alert("Oops! Password yang Anda masukkan salah.");
                        }

                    } else {
                        // JIKA AKUN TIDAK DITEMUKAN (Belum Registrasi)
                        alert("Akun tidak ditemukan! Silakan daftar terlebih dahulu.");
                    }
                });
            }
        });
    </script>
</body>
</html>
