<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        /* Warna Dasar (Default Mode Gelap) */
        :root {
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --primary: #38bdf8;
            --secondary: #c084fc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --sidebar-width: 260px;
        }

        /* LOGIKA TEMA TERANG (LIGHT MODE) */
        body:has(#theme-toggle:checked) {
            --bg-dark: #f8fafc;        
            --bg-sidebar: #ffffff;        
            --primary: #0284c7;        
            --secondary: #9333ea;      
            --text-main: #0f172a;      
            --text-muted: #475569;     
            --border-color: rgba(0, 0, 0, 0.1); 
        }
        
        .icon-sun { display: none; }
        body:has(#theme-toggle:checked) .icon-moon { display: none; }
        body:has(#theme-toggle:checked) .icon-sun { display: inline; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* =========================================
           1. FRAME KIRI (MENU SIDEBAR)
        ========================================= */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            overflow-y: auto; /* Agar menu bisa di-scroll jika kepanjangan */
        }
        
        /* Desain Scrollbar Sidebar */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            padding: 25px 20px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-color);
        }

        .theme-switch-wrapper { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        .theme-toggle-label { cursor: pointer; color: var(--text-muted); display: flex; gap: 10px; font-size: 0.95rem; font-weight: 500;}
        .theme-toggle-label:hover { color: var(--text-main); }
        .theme-checkbox { display: none; } 

        .nav-links { padding-top: 15px; padding-bottom: 30px; }
        .nav-links li a {
            display: flex;
            justify-content: space-between; /* Agar teks & panah terpisah kiri-kanan */
            align-items: center;
            padding: 15px 20px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-links li a:hover {
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-main);
            padding-left: 25px;
        }

        .nav-links li a.active {
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            border-left: 4px solid var(--primary);
            font-weight: 600;
        }

        /* =========================================
           FITUR BARU: DROPDOWN MENU
        ========================================= */
        .dropdown-btn { cursor: pointer; }
        
        /* Panah Dropdown */
        .arrow {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }
        /* Putar panah ke atas saat menu terbuka */
        .dropdown-btn.open .arrow { transform: rotate(180deg); }

        /* Container Sub-menu (Sembunyi secara default) */
        .dropdown-container {
            display: none;
            background-color: rgba(0, 0, 0, 0.1); /* Warna background beda sedikit */
            flex-direction: column;
        }

        /* Tampilkan saat class 'show' ditambahkan via JavaScript */
        .dropdown-container.show { display: flex; }

        /* Gaya teks sub-menu */
        .dropdown-container li a {
            padding: 12px 20px 12px 40px; /* Jarak kiri lebih masuk ke dalam (Indent) */
            font-size: 0.95rem;
            border-left: none !important; /* Hilangkan garis aktif di sub-menu (opsional) */
        }
        .dropdown-container li a:hover { padding-left: 45px; } /* Animasi hover sub-menu */

        /* =========================================
           2. FRAME KANAN (KONTEN UTAMA)
        ========================================= */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            padding: 40px;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.05), transparent 50%);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .hero-content { flex: 1; max-width: 600px; }
        .badge-hero {
            display: inline-block;
            background: rgba(192, 132, 252, 0.1);
            color: var(--secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .hero-content h1 { font-size: 3rem; line-height: 1.2; margin-bottom: 25px; }
        .hero-content p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 35px; }
        
        .btn-register { 
            display: inline-block; padding: 15px 35px; font-size: 1.1rem; border-radius: 30px; 
            font-weight: 600; background: linear-gradient(135deg, var(--primary), #0284c7); color: #fff; 
            transition: transform 0.3s ease;
        }
        .btn-register:hover { transform: translateY(-3px); }

        .hero-image { flex: 1; display: flex; justify-content: flex-end; }
        .hero-image img { width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        .floating-wa {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
            background-color: #25D366; border-radius: 50px; padding: 10px;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.3s ease;
        }
        .floating-wa:hover { transform: scale(1.1); }
    </style>
</head>
<body>

     <script>
        // Memastikan HTML dimuat semua dulu sebelum menjalankan script
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. JS UNTUK DROPDOWN MENU
            var dropdowns = document.getElementsByClassName("dropdown-btn");
            for (var i = 0; i < dropdowns.length; i++) {
                dropdowns[i].addEventListener("click", function(e) {
                    e.preventDefault(); // Mencegah munculnya '#' di URL
                    
                    this.classList.toggle("open");
                    var dropdownContent = this.nextElementSibling;
                    
                    if (dropdownContent.classList.contains("show")) {
                        dropdownContent.classList.remove("show");
                    } else {
                        dropdownContent.classList.add("show");
                    }
                });
            }

            // ==========================================
            // 2. JS UNTUK MENGINGAT TEMA (LOCAL STORAGE)
            // ==========================================
            const themeToggle = document.getElementById("theme-toggle");

            if (localStorage.getItem("theme") === "light") {
                themeToggle.checked = true;
            }

            themeToggle.addEventListener("change", function() {
                if (this.checked) {
                    localStorage.setItem("theme", "light");
                } else {
                    localStorage.setItem("theme", "dark");
                }
            });
            
        });
    </script>
